<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f8fc" />
    <title>AI 终末病历质控系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;450;500;550&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand-block brand-block-logo-only">
          <img class="brand-logo-full" src="./assets/qianshu-wenyi-logo-transparent.png" alt="千枢问医 QIAN SHU WEN YI" />
        </div>

        <nav class="nav-list" id="mainNav">
          <button class="nav-item is-active" data-view="overview" type="button"><span>总览驾驶舱</span></button>
          <button class="nav-item" data-view="batch" type="button"><span>导入质检</span></button>
          <button class="nav-item" data-view="review" type="button"><span>批量复核</span></button>
          <button class="nav-item" data-view="doctor" type="button"><span>临床整改</span></button>
          <button class="nav-item" data-view="recovery" type="button"><span>回收复核</span></button>
          <button class="nav-item" data-view="report" type="button"><span>报告中心</span></button>
          <button class="nav-item" data-view="rules" type="button"><span>规则看板</span></button>
        </nav>

        <section class="sidebar-panel compact-status" aria-label="今日任务状态">
          <span>72%</span>
          <small>今日完成率</small>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h2 id="viewTitle">质控工作台</h2>
          </div>
          <div class="topbar-actions">
            <label class="search-box">
              <span class="sr-only">搜索病例</span>
              <input id="globalSearch" type="search" placeholder="搜索住院号 / 患者 / 科室" />
            </label>
            <button class="button button-secondary" id="syncHisButton" type="button">同步 HIS/EMR</button>
            <button class="button button-primary" data-view-link="batch" type="button">新建质控任务</button>
          </div>
        </header>

        <section class="view is-visible" id="overviewView" aria-labelledby="overviewTitle">
          <div class="control-strip">
            <div>
              <strong>当前时间范围：本月</strong>
              <span>范围：全院</span>
              <span>规则：住院终末 v2.1</span>
              <span>HIS 同步：10:32</span>
            </div>
            <div class="control-actions">
              <button class="button button-secondary" data-view-link="review" type="button">进入批量复核</button>
              <button class="button button-primary" data-view-link="batch" type="button">发起导入质检</button>
            </div>
          </div>
          <div class="metric-grid" id="metricGrid"></div>

          <div class="dashboard-grid">
            <section class="surface large-surface">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">今日队列</p>
                  <h3>优先处理</h3>
                </div>
                <button class="text-button" data-view-link="review" type="button">进入批量复核</button>
              </div>
              <div class="case-queue" id="priorityQueue"></div>
            </section>

            <section class="surface">
              <div class="section-heading compact">
                <div>
                  <p class="eyebrow">缺陷分布</p>
                  <h3>高频问题</h3>
                </div>
              </div>
              <div class="rank-list" id="defectRanking"></div>
            </section>
          </div>

          <section class="surface task-strip">
            <div class="section-heading">
              <div>
                <p class="eyebrow">任务进度</p>
                <h3>批量质检</h3>
              </div>
            </div>
            <div class="task-list" id="taskList"></div>
          </section>
        </section>

        <section class="view" id="batchView" aria-labelledby="batchTitle">
          <div class="split-layout">
            <section class="surface filter-surface">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">病例范围</p>
                  <h3 id="batchTitle">质检任务</h3>
                </div>
                <span class="status-pill calm">院内直连</span>
              </div>

              <form class="filter-grid" id="batchForm">
               <label class="span-2">出院日期
                 <div class="date-range-field">
                   <input id="batchDischargeStart" name="dischargeStartDate" type="date" value="2026-06-01" />
                   <span>至</span>
                   <input id="batchDischargeEnd" name="dischargeEndDate" type="date" value="2026-06-27" />
                 </div>
               </label>
                <label class="span-2">入院日期
                  <div class="date-range-field">
                    <input id="batchAdmitStart" name="admitStartDate" type="date" value="2026-05-25" />
                    <span>至</span>
                    <input id="batchAdmitEnd" name="admitEndDate" type="date" value="2026-06-27" />
                  </div>
                </label>
                <label>入院科室
                  <select name="admitDepartment">
                    <option value="全部科室">全部科室</option>
                    <option value="普外科">普外科</option>
                    <option value="心内科">心内科</option>
                    <option value="骨科">骨科</option>
                    <option value="神经内科">神经内科</option>
                  </select>
                </label>
               <label>出院科室
                 <select name="department">
                   <option value="全部科室">全部科室</option>
                   <option value="普外科">普外科</option>
                   <option value="心内科">心内科</option>
                   <option value="骨科">骨科</option>
                   <option value="神经内科">神经内科</option>
                 </select>
               </label>
                <label>病区
                  <select name="ward">
                    <option value="全部">全部</option>
                    <option value="一病区">一病区</option>
                    <option value="二病区">二病区</option>
                    <option value="三病区">三病区</option>
                    <option value="四病区">四病区</option>
                    <option value="五病区">五病区</option>
                  </select>
                </label>
                <label>医疗组
                  <select name="medicalGroup">
                    <option value="全部">全部</option>
                    <option value="普外一组">普外一组</option>
                    <option value="心血管组">心血管组</option>
                    <option value="骨科组">骨科组</option>
                    <option value="神经组">神经组</option>
                  </select>
                </label>
               <label>归档状态
                 <select name="archiveStatus">
                   <option>全部</option>
                   <option>未归档</option>
                   <option>归档前</option>
                   <option>已归档</option>
                 </select>
               </label>
               <label>质控状态
                 <select name="qualityStatus">
                   <option>未质控</option>
                   <option>AI 已完成</option>
                   <option>待人工复核</option>
                   <option>待整改</option>
                 </select>
               </label>
               <label>主治医生
                 <input name="doctor" type="text" placeholder="输入医生姓名" />
               </label>
               <label>诊断 / 手术
                 <input name="diagnosis" type="text" placeholder="如：胆囊切除、心衰" />
               </label>
                <label>住院号 / 患者姓名
                  <input name="visitNoOrName" type="text" placeholder="输入住院号或姓名" />
                </label>
             </form>

              <div class="rule-picker">
                <p class="eyebrow">规则组选择</p>
                <div class="rule-options" id="ruleOptions"></div>
              </div>

              <section class="surface batch-import-panel">
                <div class="section-heading compact">
                  <div>
                    <p class="eyebrow">批量导入</p>
                    <h3>病例导入方式</h3>
                  </div>
                  <span class="status-pill calm" id="importSourceTag">HIS/EMR</span>
                </div>
                <div class="action-row">
                  <button class="button button-secondary" id="importHisButton" type="button">从 HIS 批量调取</button>
                  <button class="button button-secondary" id="uploadZipButton" type="button">上传病例包</button>
                  <button class="button button-secondary" id="uploadExcelButton" type="button">上传名单 Excel</button>
                </div>
                <div class="import-log" id="importLog">
                  <div class="import-log-item">
                    <strong>当前导入批次</strong>
                    <span>全院 2026-06 出院病例｜共 42 份</span>
                  </div>
                </div>
              </section>

              <div class="action-row">
                <button class="button button-secondary" id="selectAllCandidatesButton" type="button">全选当前结果</button>
                <button class="button button-secondary" id="previewCasesButton" type="button">预览匹配病例</button>
                <button class="button button-primary" id="createTaskButton" type="button">开始质检</button>
              </div>
            </section>

            <section class="surface selection-surface">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">匹配结果</p>
                  <h3><span id="matchedCount">42</span> 份病例</h3>
                </div>
                <div class="action-row">
                  <button class="text-button" id="selectRiskOnlyButton" type="button">只看高风险</button>
                  <button class="text-button" id="clearCandidateSelectionButton" type="button">清空选择</button>
                </div>
              </div>
              <div class="mini-table" id="candidateCases"></div>
              <div class="selection-summary" id="candidateSelectionSummary"></div>
            </section>
          </div>
        </section>

        <section class="view" id="reviewView" aria-labelledby="reviewTitle">
          <div id="reviewWorkbench"></div>
        </section>

        <section class="view" id="doctorView" aria-labelledby="doctorTitle">
          <div id="doctorWorkspace"></div>
        </section>

        <section class="view" id="recoveryView" aria-labelledby="recoveryTitle">
          <div id="recoveryWorkspace"></div>
        </section>

      <section class="view" id="reportView" aria-labelledby="reportTitle">
        <div class="report-shell">
          <section class="surface report-head">
            <div class="section-heading">
              <div>
                <p class="eyebrow">报告输出</p>
                <h3 id="reportTitle">质控报告</h3>
              </div>
              <div class="action-row inline-actions">
                <button class="button button-secondary" id="reportPrevButton" type="button">上一份</button>
                <button class="button button-secondary" id="reportNextButton" type="button">下一份</button>
                <button class="button button-secondary" id="reportPdfButton" type="button">导出 PDF</button>
                <button class="button button-primary" id="reportBatchButton" type="button">批量导出</button>
              </div>
            </div>
          </section>

          <div class="report-workspace">
            <aside class="surface report-nav" aria-label="报告目录">
              <p class="eyebrow">文书目录</p>
              <div class="report-outline" id="reportOutline"></div>
            </aside>

            <section class="surface report-panel">
              <div class="report-panel-scroll" id="reportPaper"></div>
            </section>
          </div>
        </div>
      </section>

       <section class="view" id="rulesView">
        <section class="surface">
           <div class="section-heading">
             <div>
               <p class="eyebrow">规则分析</p>
               <h3 id="rulesTitle">规则与看板</h3>
             </div>
             <div class="action-row inline-actions">
               <button class="button button-secondary" type="button">导出分析</button>
               <button class="button button-primary" type="button">新建规则版本</button>
             </div>
           </div>
           <div class="rules-dashboard-grid">
             <div class="rule-board" id="ruleBoard"></div>
             <div class="analytics-grid" id="analyticsGrid"></div>
           </div>
         </section>
       </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
